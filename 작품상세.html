<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작품상세</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      background: #f0f0f0;
      font-family: 'Pretendard', sans-serif;
    }

    /* 뷰포트 */
    .viewport {
      width: 402px;
      height: 100vh;
      background: #DCDCDC;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 스크롤 컨테이너 */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
    }

    /* 콘텐츠 */
    .page {
      position: relative;
      width: 402px;
      height: 1394px;
      background: #DCDCDC;
    }

    /* Top/Detail */
    .top {
      width: 402px;
      height: 100px;
      flex-shrink: 0;
      z-index: 10;
    }

    .top-inner {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 96px;
      position: absolute;
      width: 354px;
      height: 28px;
      left: calc(50% - 354px / 2);
      bottom: 12px;
    }

    .top-btn {
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4px 0;
      width: 36px;
      height: 28px;
      border: 1px solid #000;
      font-size: 14px;
      line-height: 20px;
      color: #000;
      cursor: pointer;
    }

    /* PreviewScale */
    .preview-scale {
      box-sizing: border-box;
      position: absolute;
      height: 600px;
      left: 12px;
      right: 12px;
      top: 0;
      background: #BDBDBD;
      border: 1px solid #000;
      border-radius: 8px;
      overflow: hidden;

      z-index: 0;
    }

    /* Frame 27 - 제목/장르 오버레이 */
    .preview-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: absolute;
      width: 268px;
      height: 97px;
      left: 20px;
      bottom: 40px;
    }

    .genre-badge {
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      width: 57px;
      height: 37px;
      background: #fff;
      border: 1px solid #000;
      font-size: 14px;
      line-height: 17px;
      color: #000;
    }

    .preview-title {
      width: 268px;
      font-size: 20px;
      font-weight: 700;
      line-height: 24px;
      color: #000;
    }

    /* Info */
    .info {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 157px;
      position: absolute;
      width: 354px;
      height: 20px;
      left: 24px;
      top: 672px;
      font-size: 14px;
      line-height: 20px;
      color: #000;
    }

    .info-right {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 20px;
    }

    /* Block */
    .block {
      position: absolute;
      width: 354px;
      left: 24px;
      background: #fff;
      border-radius: 8px;
    }

    .block-label {
      position: absolute;
      left: 24px;
      top: 24px;
      font-size: 14px;
      line-height: 17px;
      color: #000;
    }

    /* Bottom/Detail */
    .bottom {
      box-sizing: border-box;
      position: absolute;
      width: 402px;
      height: 80px;
      left: 0;
      bottom: 0;
      background: #fff;
      border-top: 1px solid #000;
    }

    .bottom-btn {
      position: absolute;
      width: 354px;
      height: 50px;
      left: calc(50% - 354px / 2);
      top: calc(50% - 50px / 2);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bottom-btn span {
      font-size: 16px;
      line-height: 19px;
      text-align: center;
      color: #fff;
    }

    .preview-scale video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .preview-scale video.loaded { opacity: 1; }

    .skeleton {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #c8c8c8 25%, #d8d8d8 50%, #c8c8c8 75%);
      background-size: 200% 100%;
      animation: shimmer 2.5s infinite;
      transition: opacity 0.3s ease;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div class="viewport">

    <!-- Top/Detail -->
    <div class="top">
      <div class="top-inner">
        <div class="top-btn" onclick="window.location.href='index.html'">닫기</div>
        <div class="top-btn">필터</div>
      </div>
    </div>

    <div class="scroll-area">
    <div class="page">

      <!-- PreviewScale -->
      <div class="preview-scale">
        <div class="preview-info">
          <div class="genre-badge">로맨스</div>
          <div class="preview-title">죽은 아내가 돌아왔다</div>
        </div>
      </div>

      <!-- Info -->
      <div class="info">
        <span>작가</span>
        <div class="info-right">
          <span>좋아요 | 좋아요 수</span>
          <span>뷰 | 뷰 수</span>
        </div>
      </div>

      <!-- Block/키워드 -->
      <div class="block" style="height: 142px; top: 716px;">
        <span class="block-label">키워드</span>
      </div>

      <!-- Block/줄거리 -->
      <div class="block" style="height: 234px; top: 878px;">
        <span class="block-label">줄거리</span>
      </div>

      <!-- Block/등장인물 -->
      <div class="block" style="height: 234px; top: 1136px;">
        <span class="block-label">등장인물</span>
      </div>

    </div>
    </div>

    <!-- Bottom/Detail -->
    <div class="bottom">
      <div class="bottom-btn">
        <span>첫 화 보기</span>
      </div>
    </div>

  </div>
  <script>
    const previewScale = document.querySelector('.preview-scale');

    const skeleton = document.createElement('div');
    skeleton.className = 'skeleton';
    previewScale.insertBefore(skeleton, previewScale.firstChild);

    const v = document.createElement('video');
    v.src = '../../Downloads/더미영상.mp4';
    v.autoplay = true;
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
    v.addEventListener('canplay', () => {
      v.classList.add('loaded');
      skeleton.style.opacity = '0';
      setTimeout(() => skeleton.remove(), 300);
    });
    previewScale.insertBefore(v, previewScale.firstChild);
  </script>
</body>
</html>
